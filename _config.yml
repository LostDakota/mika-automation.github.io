# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and access it via the global
# "site" variable.

title: The Resourceful Engineer
email: drew@mika-automation.com
description: >- # this means to ignore newlines until "baseurl:"
  Actionable Open Source. Maximizing aging hardware. Solving problems with code, not credit cards.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://LostDakota.github.io" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: LostDakota
github_username: LostDakota
kofi_username: mikaautomation
amazon_affiliate: mikaautomatio-20

theme: minima

# Build settings
plugins:
  - jekyll-feed
  - jekyll-include-cache

# Permalink Structure
permalink: /:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
